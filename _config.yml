# GitHub Pages configuration for ARIA
title: "ARIA — Analyse et Recherche en Intelligence Artificielle"
description: "Catalogue open-source de 323+ outils IA. Structuré, scoré sur 6 critères enterprise, maintenu par des agents IA autonomes."
url: "https://tito-42.github.io"
baseurl: "/ARIA"

# Include these files (not ignored by Jekyll by default)
include:
  - llms.txt
  - llms-full.txt
  - robots.txt
  - CATALOG_SUMMARY.md
  - "*.md"

# Exclude build/dev files
exclude:
  - scripts/
  - state/
  - research/
  - logs/
  - .claude/
  - "*.py"
  - node_modules/
